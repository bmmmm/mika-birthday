name: deploy pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Resolve version
        id: version
        run: |
          BASE=$(jq -r '."."' .release-please-manifest.json)
          SHA=$(git rev-parse --short HEAD)
          TAG=$(git tag --points-at HEAD | head -n1)
          if [ -n "$TAG" ]; then
            VERSION="$TAG"
          else
            VERSION="v${BASE}+${SHA}"
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Resolved version: ${VERSION}"

      - name: Inject version into HTML
        run: |
          find . -maxdepth 1 -name "*.html" -exec \
            sed -i "s|v0\.0\.0-dev|${{ steps.version.outputs.version }}|g" {} +

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: .

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
